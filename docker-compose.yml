version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: stock-dashboard-db
    environment:
      POSTGRES_DB: stock_dashboard
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stock_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-dashboard-network
    restart: unless-stopped

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: stock-dashboard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-dashboard-network
    restart: unless-stopped
    profiles:
      - with-cache

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-dashboard-api
    ports:
      - "8000:8000"
    environment:
      # Database configuration
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-changeme}@db:5432/stock_dashboard
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      
      # Redis cache (optional)
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: ${CACHE_ENABLED:-false}
      
      # External APIs
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-demo}
      YFINANCE_ENABLED: ${YFINANCE_ENABLED:-true}
      
      # Application settings
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-your_secret_key_here_change_in_production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      
      # Data collection
      COLLECTION_SCHEDULE: ${COLLECTION_SCHEDULE:-0 18 * * *}
      MAX_CONCURRENT_REQUESTS: ${MAX_CONCURRENT_REQUESTS:-10}
      
      # ML prediction (optional)
      ML_ENABLED: ${ML_ENABLED:-false}
      MODEL_RETRAIN_SCHEDULE: ${MODEL_RETRAIN_SCHEDULE:-0 0 * * 0}
      
      # API server
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: ${WORKERS:-4}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    
    depends_on:
      db:
        condition: service_healthy
    
    volumes:
      # Mount source code for development (comment out for production)
      - ./src:/app/src
      - ./dashboard:/app/dashboard
      - ./scripts:/app/scripts
      # Persist logs
      - ./logs:/app/logs
    
    networks:
      - stock-dashboard-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: stock-dashboard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html/dashboard:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - stock-dashboard-network
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  stock-dashboard-network:
    driver: bridge
